<div class="blog-detail">

  <h2 class="blog-title">{{ blog.title }}</h2>

  <div class="image-container" *ngIf="imageUrl">
    <img [src]="imageUrl" alt="Blog image" style="width: 100%; margin-top: 10px;">
  </div>

  <div class="content">
    {{ blog.content }}
  </div>

  <div class="author-container">
    <div class="author-info">
      <span><strong>Author:</strong> {{ blog.authorName }}</span>
      <span><strong>Published:</strong> {{ blog.publishedTime | date:'short' }}</span>
    </div>
  </div>

  <div class="rating-container">
    <div class="star-rating" *ngIf="authService.isLoggedIn()">
      <span
        *ngFor="let star of stars; let i = index"
        (click)="ratePost(i + 1)"
        [class.filled]="i < currentRating">
        ★
      </span>
    </div>

    <div class="rating" *ngIf="averageRating !== null">
      ⭐ {{ averageRating.toFixed(1) }}/5
    </div>
  </div>

  <app-blog-comments [blogPostId]="blogId"></app-blog-comments>

</div>
