<div class="blog-comments">

  <!-- ADD COMMENT -->
  <div class="comment-box" *ngIf="authService.isLoggedIn()">
    <h3 class="comment-title">Leave a comment</h3>

    <textarea
      class="comment-input"
      placeholder="Write your comment..."
      [(ngModel)]="newCommentContent">
    </textarea>

    <div class="comment-actions">
      <button class="comment-btn cancel" (click)="clearComment()">Cancel</button>
      <button
        class="comment-btn submit"
        [disabled]="!newCommentContent?.trim()"
        (click)="addComment()">
        Post
      </button>
    </div>
  </div>

  <!-- COMMENT LIST -->
  <div class="comment-list">

    <div *ngFor="let comment of comments" class="comment">
      <div class="comment-header">
        <span class="comment-user">{{ comment.username || 'Anonymous' }}</span>
        <span class="comment-time">{{ comment.createdAtAgo }}</span>
      </div>

      <div class="comment-content">
        {{ comment.content }}
      </div>
    </div>

    <div *ngIf="comments.length === 0" class="no-comments">
      No comments yet. Be the first one 🙂
    </div>

    <button
      *ngIf="comments.length < totalCount"
      (click)="loadMore()"
      class="load-more-btn">
      Load more
    </button>
  </div>

</div>
